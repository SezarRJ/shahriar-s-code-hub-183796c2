name: shahid_mobile
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Core
  cupertino_icons: ^1.0.8
  http: ^1.2.1
  dio: ^5.4.3
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  flutter_bloc: ^8.1.5
  equatable: ^2.0.5

  # Location & Maps
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.7.0

  # Camera & Photos
  camera: ^0.11.0
  image_picker: ^1.1.2
  exif: ^3.3.0
  image: ^4.1.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # Crypto / Hash
  crypto: ^3.0.3
  hash: ^1.0.4

  # Offline Sync / Queue
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.3.3
  workmanager: ^0.5.8

  # NTP Sync
  ntp: ^2.0.0

  # Push Notifications
  firebase_core: ^2.31.0
  firebase_messaging: ^14.9.2
  flutter_local_notifications: ^17.1.2

  # QR / Barcode (Year 2 prep)
  mobile_scanner: ^3.6.2

  # RTL & Localization
  intl: ^0.19.0
  flutter_gen: ^5.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
